name: Deploy Backend to ECS

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

  workflow_dispatch:
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Debug secrets
        run: |
          echo "AWS key exists: ${{ secrets.BACKEND_AWS_ACCESS_KEY_ID != '' }}"
          echo "AWS secret exists: ${{ secrets.BACKEND_AWS_SECRET_ACCESS_KEY != '' }}"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BACKEND_AWS_ACCESS_KEY_IDWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKEND_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t backend .

      - name: Tag image
        run: |
          docker tag backend:latest ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push image
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
